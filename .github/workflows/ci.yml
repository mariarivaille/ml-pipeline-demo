name: ML CI/CD Pipeline

on:
  push:
    branches: [ "feat/qwen_local_chatbot" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
    # 1. Скачиваем твой код
    - name: Checkout code
      uses: actions/checkout@v3

    # 2. Тестируем (просто проверяем, что файлы на месте)
    - name: Check files
      run: ls -la

    # 3. Логинимся в Docker Hub
    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 4. Собираем и отправляем образ
    - name: Build and Push Docker Image (Llama)
      uses: docker/build-push-action@v3
      with:
        context: .
        dockerfile: Dockerfile.llama
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/llama-cpp-qwen:latest
        build-args: |
          HF_TOKEN=${{ secrets.HF_TOKEN }}